<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Model Canvas Interativo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        try {
            import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
            import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
            import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

            window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
            window.dispatchEvent(new Event('firebase-sdk-ready'));
            console.log("Firebase SDK carregado com sucesso.");
        } catch (e) {
            console.error("Erro ao carregar módulos do Firebase:", e);
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .max-w-7xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            .grid { gap: 1px !important; border: 1px solid #e5e7eb; }
            textarea { border: none !important; overflow: hidden !important; min-height: 80px !important; }
            .rounded-xl { border-radius: 0 !important; border: 1px solid #e5e7eb !important; }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Placeholder para o React -->
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="loading-spinner"></div>
                <p class="text-gray-500 font-medium">A carregar Business Model Canvas...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ======================================================================
        // CONFIGURAÇÃO DO FIREBASE
        // Substitua o null pelo seu objeto { ... } obtido no Firebase Console
        // ======================================================================
        const firebaseConfig = {
  apiKey: "AIzaSyADm510HtxUFgGJIDenCxjCBWMSYhCIex0",
  authDomain: "bmc-goiasfomento.firebaseapp.com",
  projectId: "bmc-goiasfomento",
  storageBucket: "bmc-goiasfomento.firebasestorage.app",
  messagingSenderId: "1093447863440",
  appId: "1:1093447863440:web:f6f11d4593231f16435c15"
};
        // ======================================================================

        const BMCBlock = ({ title, iconName, description, value, onChange, className = "" }) => (
            <div className={`flex flex-col border-2 border-gray-200 rounded-xl p-4 bg-white hover:border-blue-400 transition-colors ${className}`}>
                <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2 text-blue-700 font-bold uppercase text-xs tracking-wider">
                        <i data-lucide={iconName} className="w-4 h-4 md:w-5 md:h-5"></i>
                        <h3>{title}</h3>
                    </div>
                    <div className="group relative no-print">
                        <i data-lucide="info" className="w-4 h-4 text-gray-400 cursor-help hover:text-blue-500"></i>
                        <div className="absolute right-0 w-64 p-3 bg-gray-800 text-white text-[11px] rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-xl border border-gray-700">
                            {description}
                        </div>
                    </div>
                </div>
                <textarea
                    className="flex-grow w-full resize-none bg-transparent focus:outline-none text-gray-700 text-sm leading-relaxed min-h-[100px]"
                    placeholder="Clique para começar a escrever..."
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                />
            </div>
        );

        const App = () => {
            const [data, setData] = useState({
                partners: "", activities: "", resources: "", propositions: "",
                relationships: "", channels: "", segments: "", costs: "", revenue: ""
            });
            const [user, setUser] = useState(null);
            const [workspaceId, setWorkspaceId] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [showSyncModal, setShowSyncModal] = useState(false);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [isAppLoading, setIsAppLoading] = useState(true);

            const appId = 'bmc-app-default';

            const getFirebaseConfig = useCallback(() => {
                if (MY_FIREBASE_CONFIG && typeof MY_FIREBASE_CONFIG === 'object') return MY_FIREBASE_CONFIG;
                return null;
            }, []);

            const initCloud = useCallback(async () => {
                const config = getFirebaseConfig();
                if (!config || !window.FirebaseSDK) {
                    console.log("Modo offline: Configuração ou SDK não encontrados.");
                    setIsAppLoading(false);
                    return;
                }

                try {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setIsAuthReady(true);
                        setIsAppLoading(false);
                    });

                    const urlParams = new URLSearchParams(window.location.search);
                    const id = urlParams.get('ws');
                    if (id) {
                        setWorkspaceId(id);
                        setIsSyncing(true);
                    }
                } catch (err) {
                    console.error("Erro na inicialização Cloud:", err);
                    setIsAppLoading(false);
                }
            }, [getFirebaseConfig]);

            useEffect(() => {
                // Carregamento inicial de segurança
                const saved = localStorage.getItem('my-bmc-data');
                if (saved) setData(JSON.parse(saved));

                if (window.FirebaseSDK) {
                    initCloud();
                } else {
                    window.addEventListener('firebase-sdk-ready', initCloud);
                }

                // Limite de tempo para remover o ecrã de carregamento se nada acontecer
                const timeout = setTimeout(() => setIsAppLoading(false), 3000);

                return () => {
                    window.removeEventListener('firebase-sdk-ready', initCloud);
                    clearTimeout(timeout);
                };
            }, [initCloud]);

            useEffect(() => {
                if (!user || !workspaceId || !window.FirebaseSDK) return;
                try {
                    const { getFirestore, doc, onSnapshot } = window.FirebaseSDK;
                    const db = getFirestore();
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', workspaceId);
                    const unsubscribe = onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) setData(docSnap.data());
                    }, (err) => console.error("Erro ao ouvir alterações:", err));
                    return () => unsubscribe();
                } catch (err) { console.error(err); }
            }, [user, workspaceId]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [data, isSyncing, showSyncModal, isAppLoading]);

            const handleUpdateData = (newData) => {
                setData(newData);
                if (isSyncing && user && workspaceId && window.FirebaseSDK) {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', workspaceId), newData)
                        .catch(e => console.error("Falha ao salvar na nuvem:", e));
                } else {
                    localStorage.setItem('my-bmc-data', JSON.stringify(newData));
                }
            };

            const enableCloudSync = async () => {
                if (!getFirebaseConfig()) {
                    alert("Configuração em falta! Por favor, insira as suas credenciais Firebase no código.");
                    return;
                }
                if (!isAuthReady) {
                    alert("A ligar ao Firebase... Tente novamente em 2 segundos.");
                    return;
                }
                try {
                    const newId = Math.random().toString(36).substring(2, 15);
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('ws', newId);
                    
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', newId), data);
                    
                    setWorkspaceId(newId);
                    setIsSyncing(true);
                    window.history.pushState({}, '', newUrl);
                    setShowSyncModal(true);
                } catch (err) {
                    alert("Erro ao ativar nuvem. Verifique se as suas Regras de Segurança no Firebase permitem escrita em 'artifacts'.");
                }
            };

            if (isAppLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="flex flex-col items-center gap-4">
                            <div className="loading-spinner"></div>
                            <p className="text-gray-500 font-medium">A conectar...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col lg:flex-row lg:items-center justify-between mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-gray-900 flex items-center gap-3">
                                    Business Model Canvas
                                    {isSyncing && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-normal flex items-center gap-1">
                                        <i data-lucide="check" className="w-3 h-3"></i> Nuvem Ativa
                                    </span>}
                                </h1>
                                <p className="text-gray-500 text-sm">Organize a sua estratégia no Notion e aceda em qualquer lugar.</p>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-2 no-print">
                                {!isSyncing ? (
                                    <button onClick={enableCloudSync} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all text-sm font-bold shadow-md">
                                        <i data-lucide="cloud" className="w-4 h-4"></i> Ativar Nuvem
                                    </button>
                                ) : (
                                    <button onClick={() => setShowSyncModal(true)} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all text-sm font-bold shadow-md">
                                        <i data-lucide="share-2" className="w-4 h-4"></i> Link de Acesso
                                    </button>
                                )}
                                <button onClick={() => window.print()} className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200" title="Gerar PDF">
                                    <i data-lucide="printer" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 min-h-[700px]">
                            <BMCBlock className="md:row-span-2" title="Parcerias" iconName="users" description="Principais parceiros e fornecedores." value={data.partners} onChange={(v) => handleUpdateData({...data, partners: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Atividades" iconName="zap" description="Ações essenciais." value={data.activities} onChange={(v) => handleUpdateData({...data, activities: v})} />
                                <BMCBlock className="flex-1" title="Recursos" iconName="box" description="Ativos necessários." value={data.resources} onChange={(v) => handleUpdateData({...data, resources: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2 bg-blue-50/50 border-blue-200" title="Proposta de Valor" iconName="gift" description="Que valor entregamos?" value={data.propositions} onChange={(v) => handleUpdateData({...data, propositions: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Relacionamento" iconName="heart" description="Relação com clientes." value={data.relationships} onChange={(v) => handleUpdateData({...data, relationships: v})} />
                                <BMCBlock className="flex-1" title="Canais" iconName="send" description="Como entregamos o valor?" value={data.channels} onChange={(v) => handleUpdateData({...data, channels: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2" title="Segmentos" iconName="target" description="Quem são os clientes?" value={data.segments} onChange={(v) => handleUpdateData({...data, segments: v})} />
                            <BMCBlock className="md:col-span-3" title="Custos" iconName="credit-card" description="Custos mais importantes." value={data.costs} onChange={(v) => handleUpdateData({...data, costs: v})} />
                            <BMCBlock className="md:col-span-2" title="Receitas" iconName="trending-up" description="Fontes de receita." value={data.revenue} onChange={(v) => handleUpdateData({...data, revenue: v})} />
                        </div>
                    </div>

                    {showSyncModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] no-print text-center">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl border border-gray-100">
                                <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="cloud-check" className="w-10 h-10"></i>
                                </div>
                                <h3 className="text-xl font-bold mb-2">Workspace Criado!</h3>
                                <p className="text-gray-600 text-sm mb-6">Utilize este URL no Notion do trabalho para aceder aos mesmos dados:</p>
                                <div className="bg-gray-50 p-4 rounded-2xl border border-gray-200 mb-6 font-mono text-[10px] text-blue-700 break-all select-all">
                                    {window.location.href}
                                </div>
                                <button onClick={() => setShowSyncModal(false)} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                                    Concluir
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
