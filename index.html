<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Model Canvas Interativo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Disponibiliza o SDK globalmente de forma segura
        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
        window.dispatchEvent(new Event('firebase-sdk-ready'));
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .max-w-7xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            .grid { gap: 1px !important; border: 1px solid #e5e7eb; }
            textarea { border: none !important; overflow: hidden !important; }
            .rounded-xl { border-radius: 0 !important; border: 1px solid #e5e7eb !important; }
        }
        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // =========================================================
        // CONFIGURAÇÃO DO FIREBASE (COLE AS SUAS CREDENCIAIS AQUI)
        // =========================================================
        const firebaseConfig = {
          apiKey: "AIzaSyADm510HtxUFgGJIDenCxjCBWMSYhCIex0",
          authDomain: "bmc-goiasfomento.firebaseapp.com",
          projectId: "bmc-goiasfomento",
          storageBucket: "bmc-goiasfomento.firebasestorage.app",
          messagingSenderId: "1093447863440",
          appId: "1:1093447863440:web:f6f11d4593231f16435c15"
       };
        // =========================================================

        const BMCBlock = ({ title, iconName, description, value, onChange, className = "" }) => {
            return (
                <div className={`flex flex-col border-2 border-gray-200 rounded-xl p-4 bg-white hover:border-blue-400 transition-colors ${className}`}>
                    <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2 text-blue-700 font-bold uppercase text-xs tracking-wider">
                            <i data-lucide={iconName} className="w-4 h-4 md:w-5 md:h-5"></i>
                            <h3>{title}</h3>
                        </div>
                        <div className="group relative no-print">
                            <i data-lucide="info" className="w-4 h-4 text-gray-400 cursor-help"></i>
                            <div className="absolute right-0 w-64 p-3 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-xl border border-gray-700">
                                {description}
                            </div>
                        </div>
                    </div>
                    <textarea
                        className="flex-grow w-full resize-none bg-transparent focus:outline-none text-gray-700 text-sm leading-relaxed min-h-[100px]"
                        placeholder="Clique para preencher..."
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                    />
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState({
                partners: "", activities: "", resources: "", propositions: "",
                relationships: "", channels: "", segments: "", costs: "", revenue: ""
            });
            const [user, setUser] = useState(null);
            const [workspaceId, setWorkspaceId] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [showSyncModal, setShowSyncModal] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [isInitialLoading, setIsInitialLoading] = useState(true);

            const appId = 'bmc-app-default';

            const getFirebaseConfig = useCallback(() => {
                if (MY_FIREBASE_CONFIG) return MY_FIREBASE_CONFIG;
                // Proteção contra variáveis de ambiente ausentes
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    try { return JSON.parse(__firebase_config); } catch (e) { return null; }
                }
                return null;
            }, []);

            const initCloud = useCallback(async () => {
                const config = getFirebaseConfig();
                
                // Se não houver config, pára o loading e usa local
                if (!config || !window.FirebaseSDK) {
                    setIsInitialLoading(false);
                    return;
                }

                try {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setIsAuthReady(true);
                        setIsInitialLoading(false);
                    });

                    const urlParams = new URLSearchParams(window.location.search);
                    const id = urlParams.get('ws');
                    if (id) {
                        setWorkspaceId(id);
                        setIsSyncing(true);
                    }
                } catch (err) {
                    console.error("Firebase falhou:", err);
                    setIsInitialLoading(false); // Garante que a app carrega mesmo com erro de rede/config
                }
            }, [getFirebaseConfig]);

            useEffect(() => {
                // Carregar LocalStorage imediatamente para evitar delay visual
                const saved = localStorage.getItem('my-bmc-data');
                if (saved) setData(JSON.parse(saved));
                
                // Tenta inicializar Firebase
                if (window.FirebaseSDK) {
                    initCloud();
                } else {
                    window.addEventListener('firebase-sdk-ready', initCloud);
                }

                // Renderizar ícones iniciais
                const timer = setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 500);

                return () => {
                    window.removeEventListener('firebase-sdk-ready', initCloud);
                    clearTimeout(timer);
                };
            }, [initCloud]);

            useEffect(() => {
                if (!user || !workspaceId || !window.FirebaseSDK) return;
                
                try {
                    const { getFirestore, doc, onSnapshot } = window.FirebaseSDK;
                    const db = getFirestore();
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', workspaceId);
                    
                    const unsubscribe = onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setData(docSnap.data());
                        }
                    }, (error) => console.error("Erro na escuta Firestore:", error));

                    return () => unsubscribe();
                } catch (err) {
                    console.error("Erro listener:", err);
                }
            }, [user, workspaceId]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [data, isSyncing, showSyncModal, isInitialLoading]);

            const handleUpdateData = (newData) => {
                setData(newData);
                if (isSyncing && user && workspaceId && window.FirebaseSDK) {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', workspaceId), newData)
                        .catch(err => console.error("Erro ao guardar na nuvem:", err));
                } else {
                    localStorage.setItem('my-bmc-data', JSON.stringify(newData));
                    setLastSaved(new Date().toLocaleTimeString());
                }
            };

            const enableCloudSync = async () => {
                const config = getFirebaseConfig();
                if (!config) {
                    alert("Atenção: Para usar a nuvem, você deve inserir suas credenciais Firebase no código (MY_FIREBASE_CONFIG).");
                    return;
                }
                
                if (!isAuthReady) {
                    alert("Aguardando ligação ao Firebase... Verifique se as credenciais estão corretas.");
                    return;
                }

                try {
                    const newId = Math.random().toString(36).substring(2, 15);
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('ws', newId);
                    
                    setWorkspaceId(newId);
                    setIsSyncing(true);
                    
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', newId), data);
                    
                    window.history.pushState({}, '', newUrl);
                    setShowSyncModal(true);
                } catch (err) {
                    console.error("Erro ao ativar nuvem:", err);
                    alert("Erro ao criar sincronização. Verifique as Regras de Segurança (Rules) no seu console do Firebase.");
                }
            };

            const exportPDF = () => window.print();

            const exportCSV = () => {
                const headers = ["Bloco", "Conteúdo"];
                const rows = [
                    ["Parcerias", data.partners], ["Atividades", data.activities], ["Recursos", data.resources],
                    ["Proposta Valor", data.propositions], ["Relacionamento", data.relationships],
                    ["Canais", data.channels], ["Segmentos", data.segments], ["Custos", data.costs], ["Receitas", data.revenue]
                ];
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers.join(",") + "\n" + 
                                  rows.map(e => e.map(val => `"${(val || '').replace(/"/g, '""')}"`).join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `bmc_export.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col lg:flex-row lg:items-center justify-between mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-gray-900 flex items-center gap-3">
                                    Business Model Canvas
                                    {isSyncing && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-normal flex items-center gap-1">
                                        <i data-lucide="check" className="w-3 h-3"></i> Sincronizado
                                    </span>}
                                </h1>
                                <p className="text-gray-500 text-sm italic">Organize a sua estratégia de negócio de forma visual.</p>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-2 no-print">
                                {!isSyncing && (
                                    <button 
                                        onClick={enableCloudSync} 
                                        disabled={isInitialLoading && !MY_FIREBASE_CONFIG}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all text-sm font-bold shadow-md ${isInitialLoading && !MY_FIREBASE_CONFIG ? 'bg-gray-200 text-gray-400' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                                    >
                                        {isInitialLoading && !MY_FIREBASE_CONFIG ? <div className="loading-spinner"></div> : <i data-lucide="cloud" className="w-4 h-4"></i>}
                                        Ativar Sincronização
                                    </button>
                                )}
                                {isSyncing && (
                                    <button onClick={() => setShowSyncModal(true)} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all text-sm font-bold shadow-md">
                                        <i data-lucide="link" className="w-4 h-4"></i> Link de Acesso
                                    </button>
                                )}
                                
                                <div className="h-8 w-px bg-gray-200 mx-1 hidden sm:block"></div>

                                <button onClick={exportCSV} title="Excel" className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200 flex items-center gap-2 px-3">
                                    <i data-lucide="table" className="w-4 h-4 text-green-600"></i>
                                    <span className="hidden md:inline text-xs font-bold">EXCEL</span>
                                </button>

                                <button onClick={exportPDF} title="PDF" className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200 flex items-center gap-2 px-3">
                                    <i data-lucide="file-text" className="w-4 h-4 text-red-500"></i>
                                    <span className="hidden md:inline text-xs font-bold">PDF</span>
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 min-h-[700px]">
                            <BMCBlock className="md:row-span-2" title="Parcerias" iconName="users" description="Principais parceiros e fornecedores." value={data.partners} onChange={(v) => handleUpdateData({...data, partners: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Atividades" iconName="settings" description="Ações essenciais." value={data.activities} onChange={(v) => handleUpdateData({...data, activities: v})} />
                                <BMCBlock className="flex-1" title="Recursos" iconName="briefcase" description="Ativos necessários." value={data.resources} onChange={(v) => handleUpdateData({...data, resources: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2 bg-blue-50 border-blue-200" title="Proposta de Valor" iconName="gift" description="Que valor entregamos?" value={data.propositions} onChange={(v) => handleUpdateData({...data, propositions: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Relacionamento" iconName="heart" description="Relação com clientes." value={data.relationships} onChange={(v) => handleUpdateData({...data, relationships: v})} />
                                <BMCBlock className="flex-1" title="Canais" iconName="truck" description="Como entregamos o valor?" value={data.channels} onChange={(v) => handleUpdateData({...data, channels: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2" title="Segmentos" iconName="users-round" description="Quem são os clientes?" value={data.segments} onChange={(v) => handleUpdateData({...data, segments: v})} />
                            <BMCBlock className="md:col-span-3" title="Custos" iconName="credit-card" description="Custos mais importantes." value={data.costs} onChange={(v) => handleUpdateData({...data, costs: v})} />
                            <BMCBlock className="md:col-span-2" title="Receitas" iconName="trending-up" description="Fontes de receita." value={data.revenue} onChange={(v) => handleUpdateData({...data, revenue: v})} />
                        </div>
                        
                        {!isSyncing && lastSaved && <div className="mt-4 text-[10px] text-gray-400 text-right no-print italic">Última alteração local guardada às {lastSaved}</div>}
                    </div>

                    {showSyncModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] no-print">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl border border-gray-100 scale-in">
                                <div className="flex items-center gap-3 mb-4 text-blue-600">
                                    <i data-lucide="cloud" className="w-8 h-8"></i>
                                    <h3 className="text-xl font-bold">Nuvem Ativada!</h3>
                                </div>
                                <p className="text-gray-600 text-sm mb-4">
                                    Use este link para sincronizar o seu Canvas no Notion do trabalho:
                                </p>
                                <div className="bg-blue-50 p-4 rounded-xl break-all text-xs font-mono text-blue-700 mb-6 border border-blue-100 select-all font-bold cursor-pointer" title="Clique para selecionar tudo">
                                    {window.location.href}
                                </div>
                                <button onClick={() => setShowSyncModal(false)} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">
                                    Fechar e Continuar
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
