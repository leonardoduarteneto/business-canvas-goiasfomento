<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Model Canvas Interativo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .max-w-7xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            .grid { gap: 1px !important; border: 1px solid #e5e7eb; }
            textarea { border: none !important; overflow: hidden !important; }
            .rounded-xl { border-radius: 0 !important; border: 1px solid #e5e7eb !important; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =========================================================
        // CONFIGURAÇÃO DO FIREBASE (COLE AS SUAS CREDENCIAIS AQUI)
        // =========================================================
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyADm510HtxUFgGJIDenCxjCBWMSYhCIex0",
            authDomain: "bmc-goiasfomento.firebaseapp.com",
            projectId: "bmc-goiasfomento",
            storageBucket: "bmc-goiasfomento.firebasestorage.app",
            messagingSenderId: "1093447863440",
            appId: "1:1093447863440:web:f6f11d4593231f16435c15"
        };

        // =========================================================

        const BMCBlock = ({ title, iconName, description, value, onChange, className = "" }) => {
            return (
                <div className={`flex flex-col border-2 border-gray-200 rounded-xl p-4 bg-white hover:border-blue-400 transition-colors ${className}`}>
                    <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2 text-blue-700 font-bold uppercase text-xs tracking-wider">
                            <i data-lucide={iconName} className="w-4 h-4 md:w-5 md:h-5"></i>
                            <h3>{title}</h3>
                        </div>
                        <div className="group relative no-print">
                            <i data-lucide="info" className="w-4 h-4 text-gray-400 cursor-help"></i>
                            <div className="absolute right-0 w-64 p-3 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none shadow-xl border border-gray-700">
                                {description}
                            </div>
                        </div>
                    </div>
                    <textarea
                        className="flex-grow w-full resize-none bg-transparent focus:outline-none text-gray-700 text-sm leading-relaxed min-h-[100px]"
                        placeholder="Clique para preencher..."
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                    />
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState({
                partners: "", activities: "", resources: "", propositions: "",
                relationships: "", channels: "", segments: "", costs: "", revenue: ""
            });
            const [user, setUser] = useState(null);
            const [workspaceId, setWorkspaceId] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [showSyncModal, setShowSyncModal] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);

            const appId = 'bmc-app-default';

            useEffect(() => {
                const saved = localStorage.getItem('my-bmc-data');
                if (saved) setData(JSON.parse(saved));
                setTimeout(() => lucide.createIcons(), 100);

                const initCloud = async () => {
                    // Tenta usar a config manual ou a do ambiente se existir
                    const config = MY_FIREBASE_CONFIG || (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null);
                    
                    if (!config || typeof window.FirebaseSDK === 'undefined') {
                        console.warn("Firebase não configurado. Sincronização desativada.");
                        return;
                    }

                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, setUser);

                        const urlParams = new URLSearchParams(window.location.search);
                        const id = urlParams.get('ws');
                        if (id) {
                            setWorkspaceId(id);
                            setIsSyncing(true);
                        }
                    } catch (err) {
                        console.error("Erro Firebase:", err);
                    }
                };

                initCloud();
            }, []);

            useEffect(() => {
                if (!user || !workspaceId || typeof window.FirebaseSDK === 'undefined') return;
                
                try {
                    const { getFirestore, doc, onSnapshot } = window.FirebaseSDK;
                    const db = getFirestore();
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', workspaceId);
                    
                    const unsubscribe = onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setData(docSnap.data());
                        }
                    }, (error) => console.error("Erro Sync:", error));

                    return () => unsubscribe();
                } catch (err) {
                    console.error("Erro listener:", err);
                }
            }, [user, workspaceId]);

            useEffect(() => {
                lucide.createIcons();
            }, [data, isSyncing, showSyncModal]);

            const handleUpdateData = (newData) => {
                setData(newData);
                if (isSyncing && user && workspaceId && typeof window.FirebaseSDK !== 'undefined') {
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', workspaceId), newData);
                } else {
                    localStorage.setItem('my-bmc-data', JSON.stringify(newData));
                    setLastSaved(new Date().toLocaleTimeString());
                }
            };

            const enableCloudSync = () => {
                const config = MY_FIREBASE_CONFIG || (typeof __firebase_config !== 'undefined' ? __firebase_config : null);
                if (!config) {
                    alert("Por favor, configure as suas credenciais Firebase no código antes de ativar a nuvem.");
                    return;
                }
                const newId = Math.random().toString(36).substring(2, 15);
                const newUrl = new URL(window.location.href);
                newUrl.searchParams.set('ws', newId);
                window.history.pushState({}, '', newUrl);
                setWorkspaceId(newId);
                setIsSyncing(true);
                setShowSyncModal(true);
                
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const db = getFirestore();
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', newId), data);
            };

            const exportPDF = () => window.print();

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col lg:flex-row lg:items-center justify-between mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-gray-900 flex items-center gap-3">
                                    Business Model Canvas
                                    {isSyncing && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-normal">Sincronizado</span>}
                                </h1>
                                <p className="text-gray-500 text-sm">Organize a sua estratégia no Notion e aceda em qualquer lugar.</p>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-2 no-print">
                                {!isSyncing && (
                                    <button onClick={enableCloudSync} className="flex items-center gap-2 px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all text-sm font-semibold shadow-md">
                                        <i data-lucide="cloud" className="w-4 h-4"></i> Ativar Sincronização
                                    </button>
                                )}
                                {isSyncing && (
                                    <button onClick={() => setShowSyncModal(true)} className="flex items-center gap-2 px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all text-sm font-semibold shadow-md">
                                        <i data-lucide="link" className="w-4 h-4"></i> Link do Workspace
                                    </button>
                                )}
                                <button onClick={exportPDF} title="PDF" className="p-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200">
                                    <i data-lucide="file-text" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 min-h-[700px]">
                            <BMCBlock className="md:row-span-2" title="Parcerias" iconName="users" description="Principais parceiros e fornecedores." value={data.partners} onChange={(v) => handleUpdateData({...data, partners: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Atividades" iconName="settings" description="Ações essenciais." value={data.activities} onChange={(v) => handleUpdateData({...data, activities: v})} />
                                <BMCBlock className="flex-1" title="Recursos" iconName="briefcase" description="Ativos necessários." value={data.resources} onChange={(v) => handleUpdateData({...data, resources: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2 bg-blue-50 border-blue-200" title="Proposta de Valor" iconName="gift" description="Que valor entregamos?" value={data.propositions} onChange={(v) => handleUpdateData({...data, propositions: v})} />
                            <div className="md:row-span-2 flex flex-col gap-3">
                                <BMCBlock className="flex-1" title="Relacionamento" iconName="heart" description="Relação com clientes." value={data.relationships} onChange={(v) => handleUpdateData({...data, relationships: v})} />
                                <BMCBlock className="flex-1" title="Canais" iconName="truck" description="Como entregamos o valor?" value={data.channels} onChange={(v) => handleUpdateData({...data, channels: v})} />
                            </div>
                            <BMCBlock className="md:row-span-2" title="Segmentos" iconName="users-round" description="Quem são os clientes?" value={data.segments} onChange={(v) => handleUpdateData({...data, segments: v})} />
                            <BMCBlock className="md:col-span-3" title="Custos" iconName="credit-card" description="Custos mais importantes." value={data.costs} onChange={(v) => handleUpdateData({...data, costs: v})} />
                            <BMCBlock className="md:col-span-2" title="Receitas" iconName="trending-up" description="Fontes de receita." value={data.revenue} onChange={(v) => handleUpdateData({...data, revenue: v})} />
                        </div>
                    </div>

                    {showSyncModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] no-print">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-4">Sincronização Ativa! 🚀</h3>
                                <p className="text-gray-600 text-sm mb-4">Copie o link abaixo e use-o no seu Notion (ou favoritos) para aceder aos mesmos dados em qualquer lugar:</p>
                                <div className="bg-gray-100 p-3 rounded-lg break-all text-xs font-mono text-blue-600 mb-6 border border-gray-200 select-all">
                                    {window.location.href}
                                </div>
                                <button onClick={() => setShowSyncModal(false)} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Começar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
